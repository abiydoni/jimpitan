---
deployment:
  tasks:
    - export DEPLOYPATH=/home2/appsbeem/jimpitan.appsbee.my.id
    - /bin/cp -R * $DEPLOYPATH
    - cd $DEPLOYPATH
    - /usr/local/bin/composer install --no-dev --optimize-autoloader
    - cd $DEPLOYPATH
    - /usr/bin/php -r "if (file_exists('composer.json')) { shell_exec('/usr/local/bin/composer install --no-dev --optimize-autoloader'); }"
